# Read-only Docker API proxy for the meta-monitoring agent.
#
# The monitoring agent must observe container state (Status, OOMKilled,
# RestartCount, Health) and tail logs to detect crash-loops / OOMKills that the
# HTTP /healthz probe cannot see (see docs/plan/2-meta-monitoring.md §1.2, §2).
# It must NEVER touch the raw /var/run/docker.sock: a `:ro` bind on the socket
# does NOT make the Docker API read-only (the API is read/write regardless), so
# a compromised monitor with the raw socket = root on the host.
#
# Instead we put tecnativa/docker-socket-proxy (haproxy in front of the socket)
# on the `agent_backend` network. It exposes the socket as TCP :2375 but ONLY
# the GET verbs we whitelist below; every mutating verb (POST/exec/start/stop/
# create/...) and every privileged endpoint stays 0 (403). The proxy itself is
# the only container that mounts the socket, read-only.
#
# Run on the host (alongside the shared agent_backend stack):
#   docker compose -f infra/docker-socket-proxy.yml up -d
#
# The monitor reaches it as http://docker-proxy:2375 over agent_backend
# (settings.docker_proxy_url). Port 2375 is NOT published to the host — it is
# only resolvable inside the docker network. ~15-25 MiB RSS.
services:
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: docker-proxy
    # The single sensitive mount. Read-only; the proxy's verb-allowlist below is
    # the real control — :ro alone is insufficient (see header note).
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # --- ALLOW (read-only GET surface the monitor needs) ---
      # List/inspect containers: GET /containers/json, /containers/<id>/json.
      CONTAINERS: 1
      # Daemon info (GET /info, /version) — used for a basic engine liveness probe.
      INFO: 1
      VERSION: 1
      # Health/ping of the proxy itself (GET /_ping).
      PING: 1
      # Container logs are served under the EVENTS/logs path; LOGS=1 enables
      # GET /containers/<id>/logs for the error-rate tail (plan §1.3).
      LOGS: 1

      # --- DENY everything else (explicit 0 = 403, defense-in-depth even though
      #     these default to 0; pinned so an image bump can't silently open them) ---
      # No write/lifecycle verbs at all (the proxy also gates by HTTP method:
      # POST is rejected unless POST=1, which we never set).
      POST: 0
      # Privileged / host-reachable endpoints — all off.
      EXEC: 0
      AUTH: 0
      SECRETS: 0
      CONFIGS: 0
      SWARM: 0
      NODES: 0
      TASKS: 0
      SERVICES: 0
      PLUGINS: 0
      VOLUMES: 0
      NETWORKS: 0
      IMAGES: 0
      BUILD: 0
      COMMIT: 0
      SYSTEM: 0
      DISTRIBUTION: 0
      SESSION: 0
      EVENTS: 0
    networks:
      - agent_backend
    security_opt:
      - no-new-privileges:true
    # Proxy needs the socket fd; do not cap_drop ALL (haproxy needs to bind/proxy).
    # It exposes no published port — internal to agent_backend only.
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    restart: unless-stopped

networks:
  agent_backend:
    external: true
    name: agent_backend
