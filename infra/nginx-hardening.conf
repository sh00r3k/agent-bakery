# agent-bakery — nginx hardening primitives.
#
# This file is NOT a vhost. It holds the http-level + reusable building blocks
# every agent subdomain (monitoring/dashboard.agents.example.com)
# pulls in, plus a catch-all default-deny server that absorbs unknown Hosts /
# bare-IP scans. The system nginx terminates TLS (certbot per subdomain) and
# proxies to the loopback ports in docs/ports.md.
#
# Layout on the host (system nginx, /etc/nginx):
#   /etc/nginx/conf.d/agents-hardening.conf   <- THIS FILE (http context)
#   /etc/nginx/sites-available/<sub>.agents.example.com  <- per-subdomain vhost
# Include the snippets below from each vhost (see "PER-SUBDOMAIN INCLUDE").
#
# ─────────────────────────────────────────────────────────────────────────────
# http { } CONTEXT  (place this file in conf.d/ so it loads inside http{})
# ─────────────────────────────────────────────────────────────────────────────

# 1) Do not advertise the nginx version (banner) in responses or error pages.
server_tokens off;

# 2) Rate-limit zone, keyed by client IP. 10 r/s sustained with a small burst
#    (applied per-location via `limit_req` in the snippet below). 10m of shared
#    memory tracks ~160k distinct IPs. Tune `rate` per agent if a webhook needs
#    higher throughput (e.g. monitoring /webhook/sentry).
limit_req_zone $binary_remote_addr zone=agents_rl:10m rate=10r/s;

# 3) Connection cap per IP (slow-loris / fan-out abuse backstop).
limit_conn_zone $binary_remote_addr zone=agents_conn:10m;

# 4) Return 429 (not the default 503) when the rate limit trips, so clients and
#    the monitoring agent can tell throttling apart from an upstream outage.
limit_req_status 429;
limit_conn_status 429;

# Cap request body globally for agent APIs (webhooks are small JSON). Override
# in a specific location if an agent legitimately accepts larger payloads.
client_max_body_size 1m;

# ─────────────────────────────────────────────────────────────────────────────
# DEFAULT-DENY VHOST
# Catch every request whose Host is not an explicit agent subdomain (bare-IP
# hits, scanners, unknown vhosts). `default_server` + an unmatchable server_name
# makes this the fallback. It closes the connection (444) without leaking which
# services exist. Real agent vhosts use their exact server_name and therefore
# win the match; only the leftovers land here.
# ─────────────────────────────────────────────────────────────────────────────
server {
    # Plain HTTP catch-all.
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    # 444 = nginx closes the connection with no response.
    return 444;
}

# HTTPS catch-all needs a cert to complete the TLS handshake before it can 444.
# Point it at any existing agent cert (e.g. monitoring's) — it serves nothing.
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/monitoring.agents.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monitoring.agents.example.com/privkey.pem;
    # Modern TLS only.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    return 444;
}

# ─────────────────────────────────────────────────────────────────────────────
# PER-SUBDOMAIN INCLUDE  (reusable snippet)
# Save the two blocks below as /etc/nginx/snippets/agents-security.conf and
# /etc/nginx/snippets/agents-proxy.conf, then from each agent vhost server{}:
#
#   server {
#       listen 443 ssl;
#       http2 on;
#       server_name security.agents.example.com;
#       ssl_certificate     /etc/letsencrypt/live/security.agents.example.com/fullchain.pem;
#       ssl_certificate_key /etc/letsencrypt/live/security.agents.example.com/privkey.pem;
#       ssl_protocols TLSv1.2 TLSv1.3;
#
#       include snippets/agents-security.conf;   # headers + rate-limit
#       # admin-only agents (security, dashboard) ALSO add an IP allowlist here:
#       #   allow <office-ip>; deny all;
#
#       location / {
#           proxy_pass http://127.0.0.1:8003;    # port from docs/ports.md
#           include snippets/agents-proxy.conf;  # proxy headers + timeouts
#       }
#   }
# ─────────────────────────────────────────────────────────────────────────────

# --- snippets/agents-security.conf : security headers + limits (server context) ---
#   # Security headers (HSTS only over TLS; preload after you are sure).
#   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
#   add_header X-Content-Type-Options    "nosniff"        always;
#   add_header X-Frame-Options           "DENY"           always;
#   add_header Referrer-Policy           "no-referrer"    always;
#   add_header Content-Security-Policy    "default-src 'self'; frame-ancestors 'none'" always;
#   # Drop the upstream Server header (uvicorn) so we don't leak the stack.
#   proxy_hide_header Server;
#   server_tokens off;
#   # Apply the shared rate-limit + connection cap (zones defined in http{} above).
#   limit_req  zone=agents_rl burst=20 nodelay;
#   limit_conn agents_conn 20;

# --- snippets/agents-proxy.conf : proxy hygiene (location context) ---
#   proxy_http_version 1.1;
#   proxy_set_header Host              $host;
#   proxy_set_header X-Real-IP         $remote_addr;
#   proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
#   proxy_set_header X-Forwarded-Proto $scheme;
#   proxy_set_header Connection        "";
#   proxy_connect_timeout 5s;
#   proxy_read_timeout    30s;
#
# Notes:
# - Admin-only agents (security :8003, dashboard :8005) MUST add an IP allowlist
#   (`allow <ip>; deny all;`) inside their server{} as defense-in-depth — the
#   HS256 admin gate is the primary control, the allowlist is the second.
# - Unauthenticated webhook paths (monitoring /webhook/sentry|alert) should get
#   their OWN location with a tighter `allow` (Sentry egress IPs) or a secret
#   path + shared-secret header; do not rely on the global rate-limit alone.
