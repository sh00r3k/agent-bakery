# Periodic security audit — runs weekly + on-demand. Catches:
#   * secrets leaked after a force-push / history rewrite
#   * CVEs in transitive PyPI deps that arrived between Dependabot cycles
#   * config drift (new .env tracked, .gitignore holes)
#   * workflow tampering (matrix.* typos, action-pinning regressions)
#
# Stays read-only — never publishes. Findings surface in the Actions UI
# (gitleaks) and as a markdown job summary (everything else).
name: audit

on:
  schedule:
    - cron: "0 6 * * 1"   # 06:00 UTC every Monday, after Dependabot's window
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: audit-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_PYTHON: "3.12"

jobs:
  secrets:
    name: secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: gitleaks (full history)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_HISTORY: true

  deps:
    name: deps (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - name: pip-audit (PyPI transitive deps only)
        run: uv run --with pip-audit pip-audit --strict --skip-editable .

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  config-drift:
    name: config drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: assert .env* is not tracked
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)\.env(\.|$)' | grep -v 'env\.example$'; then
            echo "::error::A .env file is tracked. Add to .gitignore and remove from history."
            git ls-files | grep -E '(^|/)\.env(\.|$)' | grep -v 'env\.example$'
            exit 1
          fi
      - name: assert no real IPs / domains in tracked files
        run: |
          set -euo pipefail
          # any non-RFC1918 IPv4 outside the standard docker bridge subnets
          hits=$(git ls-files -z | xargs -0 grep -nE '\b(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\b' 2>/dev/null \
            | grep -vE '127\.0\.0\.1|0\.0\.0\.0|255\.255\.255\.255|255\.255\.255\.0|10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[0-1])\.' \
            || true)
          if [ -n "$hits" ]; then
            echo "::warning::Found non-RFC1918 IPs in tracked files. Review:"
            echo "$hits"
          fi
