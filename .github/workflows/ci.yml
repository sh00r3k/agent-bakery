name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_PYTHON: "3.12"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    name: mypy (${{ matrix.member }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        member:
          - packages/agentkit
          - agents/monitoring
          - apps/dashboard
          - apps/platform-cli
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - run: uv run --directory ${{ matrix.member }} mypy src

  test:
    name: pytest (${{ matrix.member }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        member:
          - packages/agentkit
          - agents/monitoring
          - apps/dashboard
          - apps/platform-cli
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - run: uv run --directory ${{ matrix.member }} pytest -q

  security:
    name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      # Lockfile-driven CVE scan (BR-010: no secrets in the repo; secret scanning
      # runs against the git history so redactions aren't accidentally lost).
      # `--skip-editable` excludes the local workspace members (agentkit, etc.)
      # which are not on PyPI — only PyPI-published transitive deps are audited.
      # `.` scopes the audit to the root project (the workspace aggregator's
      # pyproject has no direct deps of its own; the transitive surface lives
      # in the lockfile).
      - run: uv run --with pip-audit pip-audit --strict --skip-editable .
      - name: gitleaks (full history)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_HISTORY: true
