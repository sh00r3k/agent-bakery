# Release pipeline — ADR-0012 / US-022.
#
# Pushing a SemVer tag (e.g. `v0.2.0`) builds every per-member image and
# publishes it to GHCR. The tag's version (with the leading `v` stripped)
# becomes the IMAGE_TAG operators pin in their .env.
#
# Deliberate non-features (see ADR-0012 "Out of scope"):
#   * no `:latest` — ADR-0009: a "latest" tag is a footgun in prod
#   * no PR-build job — per-member pytest+ruff+mypy already gate correctness
#   * no multi-arch — amd64 hosts only; revisit with BuildKit platforms+QEMU
#
# Auth: the built-in GITHUB_TOKEN is enough for GHCR in public repos, no
# extra secrets to manage. Keep `packages: write` minimal.
name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build:
    name: build & push (${{ matrix.title }})
    runs-on: ubuntu-24.04
    strategy:
      # fail-fast: false keeps the surviving matrix legs publishing even if
      # one Dockerfile is broken — easier to diagnose + partial release is
      # strictly better than no release on a tag push.
      fail-fast: false
      matrix:
        include:
          - id: monitoring-agent
            dockerfile: agents/monitoring/Dockerfile
            title: monitoring
          - id: dashboard
            dockerfile: apps/dashboard/Dockerfile
            title: dashboard
          - id: platform-cli
            dockerfile: apps/platform-cli/Dockerfile
            title: platform-cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build & push (${{ matrix.title }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/agent-bakery/${{ matrix.title }}:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=${{ matrix.title }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
          # BuildKit attestations — SLSA provenance + SPDX SBOM. GHCR surfaces
          # both on the image's "Provenance" / "SBOM" tabs.
          provenance: true
          sbom: true
          # GitHub Actions cache keeps re-builds of the same tag fast (and
          # reproducible when combined with digest-pinned base images).
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        id: digest
        run: |
          set -euo pipefail
          digest=$(docker buildx imagetools inspect \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/agent-bakery/${{ matrix.title }}:${{ steps.version.outputs.version }}" \
            --format '{{json .}}' | jq -r '.digest')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/agent-bakery/${{ matrix.title }}@$digest"
