[project]
name = "agentkit"
version = "0.1.0"
description = "Shared toolkit for self-hosted LangGraph agents: config, LLM gateway client, observability, FastAPI server, JWT auth, Postgres/Redis helpers."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [
    { name = "sh00r3k", email = "sh00r3k@gmail.com" }
]
keywords = ["agentkit", "langgraph", "toolkit", "llm", "ops"]
classifiers = [
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3 :: Only",
    "Operating System :: POSIX :: Linux",
    "License :: OSI Approved :: Apache Software License",
    "Framework :: FastAPI",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "pydantic>=2.9",
    "pydantic-settings>=2.5",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "httpx>=0.27",
    "openai>=1.40",
    "psycopg[binary,pool]>=3.2",
    "redis>=5.0",
    "pyjwt>=2.9",
    "structlog>=24.1",
    "aio-pika>=9.4",
]

[project.optional-dependencies]
# Heavy / optional: only install where the agent actually needs them.
anthropic = ["anthropic>=0.49"]
langchain = ["langchain-core>=0.3", "langchain-openai>=0.2"]
observability = ["opentelemetry-sdk>=1.27", "opentelemetry-exporter-otlp>=1.27"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentkit"]
# Ship the PEP 561 marker so downstream agents get agentkit's inline types.
